<!-- Default Agent Configuration -->
<!-- This is the default configuration applied to all agents -->
<!-- Generated by Wazuh Deployer -->

<!-- Labels for default group -->
<labels>
  <label key="site">default</label>
  <label key="env">unknown</label>
  <label key="owner">unknown</label>
  <label key="criticality">tier3</label>
</labels>

<!-- Syscollector - System inventory -->
<wodle name="syscollector">
  <disabled>no</disabled>
  <interval>1h</interval>
  <scan_on_start>yes</scan_on_start>
  <hardware>yes</hardware>
  <os>yes</os>
  <network>yes</network>
  <packages>yes</packages>
  <ports all="no">yes</ports>
  <processes>yes</processes>
  <users>yes</users>
  <groups>yes</groups>
  <services>yes</services>
  <browser_extensions>yes</browser_extensions>
  <synchronization>
    <max_eps>10</max_eps>
  </synchronization>
</wodle>

<!-- Vulnerability Detection -->
<vulnerability-detection>
  <enabled>yes</enabled>
  <index-status>yes</index-status>
  <feed-update-interval>60m</feed-update-interval>
</vulnerability-detection>

<!-- Security Configuration Assessment -->
<sca>
  <enabled>yes</enabled>
  <scan_on_start>yes</scan_on_start>
  <interval>12h</interval>
  <skip_nfs>yes</skip_nfs>
</sca>

<!-- File Integrity Monitoring - Basic -->
<syscheck>
  <disabled>no</disabled>
  <frequency>43200</frequency>
  <directories check_all="yes">/etc</directories>
  <directories check_all="yes">/usr/bin</directories>
  <directories check_all="yes">/usr/sbin</directories>
  <directories check_all="yes">/usr/local/bin</directories>
  <directories check_all="yes">/usr/local/sbin</directories>
  <skip_nfs>yes</skip_nfs>
  <skip_dev>yes</skip_dev>
  <skip_proc>yes</skip_proc>
  <skip_sys>yes</skip_sys>
  <process_priority>10</process_priority>
  <max_eps>50</max_eps>
  <synchronization>
    <enabled>yes</enabled>
    <interval>5m</interval>
    <max_eps>10</max_eps>
  </synchronization>
</syscheck>

<!-- Rootcheck - Rootkit detection -->
<rootcheck>
  <disabled>no</disabled>
  <check_files>yes</check_files>
  <check_trojans>yes</check_trojans>
  <check_dev>yes</check_dev>
  <check_sys>yes</check_sys>
  <check_all>no</check_all>
</rootcheck>

<!-- OpenSCAP - Security content automation protocol -->
<wodle name="open-scap">
  <disabled>yes</disabled>
  <timeout>1800</timeout>
  <interval>86400</interval>
  <scan-on-start>yes</scan-on-start>
</wodle>

<!-- CIS-CAT - CIS benchmarks -->
<wodle name="cis-cat">
  <disabled>yes</disabled>
  <timeout>1800</timeout>
  <interval>86400</interval>
  <scan-on-start>yes</scan-on-start>
</wodle>
