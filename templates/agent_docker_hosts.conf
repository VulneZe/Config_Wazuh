<!-- Docker Hosts Agent Configuration -->
<!-- For hosts running Docker containers -->
<!-- Generated by Wazuh Deployer -->

<!-- Labels for docker-hosts group -->
<labels>
  <label key="site">nantes</label>
  <label key="env">prod</label>
  <label key="owner">devops</label>
  <label key="criticality">tier2</label>
  <label key="exposed">no</label>
</labels>

<!-- Syscollector -->
<wodle name="syscollector">
  <disabled>no</disabled>
  <interval>1h</interval>
  <scan_on_start>yes</scan_on_start>
  <hardware>yes</hardware>
  <os>yes</os>
  <network>yes</network>
  <packages>yes</packages>
  <ports all="no">yes</ports>
  <processes>yes</processes>
  <users>yes</users>
  <groups>yes</groups>
  <services>yes</services>
  <browser_extensions>yes</browser_extensions>
  <synchronization>
    <max_eps>10</max_eps>
  </synchronization>
</wodle>

<!-- Vulnerability Detection -->
<vulnerability-detection>
  <enabled>yes</enabled>
  <index-status>yes</index-status>
  <feed-update-interval>60m</feed-update-interval>
</vulnerability-detection>

<!-- SCA - Docker security benchmarks -->
<sca>
  <enabled>yes</enabled>
  <scan_on_start>yes</scan_on_start>
  <interval>12h</interval>
  <skip_nfs>yes</skip_nfs>
  <policies>
    <policy>/var/ossec/ruleset/sca/cis_docker.yml</policy>
    <policy>/var/ossec/ruleset/sca/cis_ubuntu_linux_20.04.yml</policy>
  </policies>
</sca>

<!-- FIM - Focus on Docker-related directories -->
<syscheck>
  <disabled>no</disabled>
  <frequency>43200</frequency>
  <directories check_all="yes" whodata="yes">/etc</directories>
  <directories check_all="yes" whodata="yes">/var/lib/docker</directories>
  <directories check_all="yes" whodata="yes">/opt/docker</directories>
  <directories check_all="yes" whodata="yes">/var/www</directories>
  <nodiff>/etc/ssl/private.key</nodiff>
  <skip_nfs>yes</skip_nfs>
  <skip_dev>yes</skip_dev>
  <skip_proc>yes</skip_proc>
  <skip_sys>yes</skip_sys>
  <process_priority>10</process_priority>
  <max_eps>50</max_eps>
  <synchronization>
    <enabled>yes</enabled>
    <interval>5m</interval>
    <max_eps>10</max_eps>
  </synchronization>
</syscheck>

<!-- Docker Listener - Monitor Docker daemon events -->
<wodle name="docker-listener">
  <disabled>no</disabled>
  <interval>10m</interval>
  <attempts>5</attempts>
  <run_on_start>yes</run_on_start>
</wodle>

<!-- Log Collection - Docker logs -->
<localfile>
  <location>/var/log/auth.log</location>
  <log_format>syslog</log_format>
</localfile>
<localfile>
  <location>/var/log/syslog</location>
  <log_format>syslog</log_format>
</localfile>
<localfile>
  <location>/var/log/docker.log</location>
  <log_format>syslog</log_format>
</localfile>

<!-- Anti-tampering -->
<agent_config os="linux">
  <anti_tampering>
    <package_uninstallation>yes</package_uninstallation>
  </anti_tampering>
</agent_config>
