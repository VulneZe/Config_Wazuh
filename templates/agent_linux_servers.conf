<!-- Linux Servers Agent Configuration -->
<!-- For production Linux servers -->
<!-- Generated by Wazuh Deployer -->

<!-- Labels for linux-servers-prod group -->
<labels>
  <label key="site">nantes</label>
  <label key="env">prod</label>
  <label key="owner">infra</label>
  <label key="criticality">tier1</label>
  <label key="exposed">no</label>
</labels>

<!-- Syscollector - Enhanced for production servers -->
<wodle name="syscollector">
  <disabled>no</disabled>
  <interval>1h</interval>
  <scan_on_start>yes</scan_on_start>
  <hardware>yes</hardware>
  <os>yes</os>
  <network>yes</network>
  <packages>yes</packages>
  <ports all="no">yes</ports>
  <processes>yes</processes>
  <users>yes</users>
  <groups>yes</groups>
  <services>yes</services>
  <browser_extensions>yes</browser_extensions>
  <synchronization>
    <max_eps>10</max_eps>
  </synchronization>
</wodle>

<!-- Vulnerability Detection -->
<vulnerability-detection>
  <enabled>yes</enabled>
  <index-status>yes</index-status>
  <feed-update-interval>60m</feed-update-interval>
</vulnerability-detection>

<!-- SCA - Security benchmarks for production -->
<sca>
  <enabled>yes</enabled>
  <scan_on_start>yes</scan_on_start>
  <interval>12h</interval>
  <skip_nfs>yes</skip_nfs>
  <policies>
    <policy>/var/ossec/ruleset/sca/cis_ubuntu_linux_20.04.yml</policy>
    <policy>/var/ossec/ruleset/sca/cis_debian_linux_10.yml</policy>
    <policy>/var/ossec/ruleset/sca/pci_dss.yml</policy>
  </policies>
</sca>

<!-- FIM - Enhanced for production with whodata -->
<syscheck>
  <disabled>no</disabled>
  <frequency>43200</frequency>
  <directories check_all="yes" whodata="yes">/etc</directories>
  <directories check_all="yes" whodata="yes">/opt</directories>
  <directories check_all="yes" whodata="yes">/var/www</directories>
  <directories check_all="yes" whodata="yes">/usr/local/bin</directories>
  <directories check_all="yes" whodata="yes">/usr/local/sbin</directories>
  <nodiff>/etc/ssl/private.key</nodiff>
  <skip_nfs>yes</skip_nfs>
  <skip_dev>yes</skip_dev>
  <skip_proc>yes</skip_proc>
  <skip_sys>yes</skip_sys>
  <process_priority>10</process_priority>
  <max_eps>50</max_eps>
  <synchronization>
    <enabled>yes</enabled>
    <interval>5m</interval>
    <max_eps>10</max_eps>
  </synchronization>
</syscheck>

<!-- Log Collection - Linux authentication and system logs -->
<localfile>
  <location>/var/log/auth.log</location>
  <log_format>syslog</log_format>
</localfile>
<localfile>
  <location>/var/log/secure</location>
  <log_format>syslog</log_format>
</localfile>
<localfile>
  <location>/var/log/syslog</location>
  <log_format>syslog</log_format>
</localfile>
<localfile>
  <location>/var/log/messages</location>
  <log_format>syslog</log_format>
</localfile>

<!-- Anti-tampering - Prevent unauthorized uninstallation -->
<agent_config os="linux">
  <anti_tampering>
    <package_uninstallation>yes</package_uninstallation>
  </anti_tampering>
</agent_config>

<!-- Active Response - Host deny for SSH brute force -->
<active-response>
  <disabled>no</disabled>
  <command>host-deny</command>
  <location>defined-agent</location>
  <level>10</level>
  <rules_group>sshd,|pci_dss_11.4,</rules_group>
  <timeout>60</timeout>
</active-response>
